
import asyncio
import os
import psutil
import subprocess
from datetime import datetime
from pathlib import Path
from telegram import Update, InlineKeyboardButton, InlineKeyboardMarkup
from telegram.ext import Application, CommandHandler, CallbackQueryHandler, MessageHandler, ContextTypes, filters

# ================= CONFIG =================
BOT_TOKEN = "8564660538:AAGN6-az1oTiljVAWxgsJqCsJLDKPKrj7OM"
OWNER_ID = 7131424891

SCRIPTS_DIR = "scripts"
MAX_SCRIPTS = 200
AUTO_RESTART = False
MONITOR_INTERVAL = 2

AUTHORIZED_USERS = set()

Path(SCRIPTS_DIR).mkdir(exist_ok=True)

running_scripts = {}
script_process = {}

# ================= PERMISSION =================
def is_allowed(user_id: int):
    return user_id == OWNER_ID or user_id in AUTHORIZED_USERS

# ================= PROCESS MONITOR =================
async def monitor():

    for proc in script_process.values():
        try:
            psutil.Process(proc.pid).cpu_percent(None)
        except Exception:
            pass

    while True:

        for name, proc in list(script_process.items()):

            if proc.poll() is not None:

                if AUTO_RESTART:
                    start_script(Path(SCRIPTS_DIR) / name)
                else:
                    running_scripts[name]["status"] = "stopped"
                    continue

            try:
                p = psutil.Process(proc.pid)

                cpu = p.cpu_percent(None) / psutil.cpu_count()
                ram = p.memory_percent()

                running_scripts[name]["cpu"] = round(cpu, 2)
                running_scripts[name]["ram"] = round(ram, 2)
                running_scripts[name]["status"] = "running"

            except Exception:
                running_scripts[name]["cpu"] = 0
                running_scripts[name]["ram"] = 0
                running_scripts[name]["status"] = "error"

        await asyncio.sleep(MONITOR_INTERVAL)

# ================= SCRIPT CONTROL =================

def start_script(path: Path):

    name = path.name

    if name in script_process:
        return

    proc = subprocess.Popen(["python", str(path)])

    script_process[name] = proc

    running_scripts[name] = {
        "pid": proc.pid,
        "cpu": 0,
        "ram": 0,
        "status": "starting",
        "started": datetime.now()
    }


def stop_script(name: str):

    if name not in script_process:
        return False

    try:
        script_process[name].terminate()
        del script_process[name]
        running_scripts[name]["status"] = "stopped"
        return True
    except Exception:
        return False


def delete_script(name: str):

    path = Path(SCRIPTS_DIR) / name

    if name in script_process:
        stop_script(name)

    try:
        if path.exists():
            os.remove(path)

        if name in running_scripts:
            del running_scripts[name]

        return True

    except Exception:
        return False

# ================= UI =================

def main_menu():

    return InlineKeyboardMarkup([
        [InlineKeyboardButton("📊 Dashboard", callback_data="dashboard")],
        [InlineKeyboardButton("📜 Running Scripts", callback_data="running")],
        [InlineKeyboardButton("📤 Upload Script", callback_data="upload")],
        [InlineKeyboardButton("▶ Run Script", callback_data="run")],
        [InlineKeyboardButton("🛑 Stop Script", callback_data="stop")],
        [InlineKeyboardButton("🗑 Delete Script", callback_data="delete")]
    ])

# ================= COMMAND =================

async def start(update: Update, context: ContextTypes.DEFAULT_TYPE):

    if not is_allowed(update.effective_user.id):
        await update.message.reply_text("Unauthorized")
        return

    await update.message.reply_text(
        "🚀 Script Hosting Panel Ready",
        reply_markup=main_menu()
    )

# ================= BUTTON HANDLER =================

async def buttons(update: Update, context: ContextTypes.DEFAULT_TYPE):

    query = update.callback_query
    await query.answer()

    user = query.from_user.id

    if not is_allowed(user):
        await query.edit_message_text("Unauthorized")
        return

    data = query.data

    if data == "dashboard":

        total_cpu = sum(v["cpu"] for v in running_scripts.values())
        total_ram = sum(v["ram"] for v in running_scripts.values())

        text = f"""
📊 DASHBOARD

Scripts: {len(os.listdir(SCRIPTS_DIR))}/{MAX_SCRIPTS}
Running: {len(script_process)}
CPU Usage: {total_cpu:.2f}%
RAM Usage: {total_ram:.2f}%
Time: {datetime.now().strftime('%H:%M:%S')}
"""

        await query.edit_message_text(text, reply_markup=main_menu())

    elif data == "running":

        if not running_scripts:
            await query.edit_message_text("No scripts running", reply_markup=main_menu())
            return

        text = "📜 RUNNING SCRIPTS\n\n"

        for name, info in running_scripts.items():

            text += f"{name}\n"
            text += f"PID: {info['pid']}\n"
            text += f"CPU: {info['cpu']:.2f}%\n"
            text += f"RAM: {info['ram']:.2f}%\n"
            text += f"Status: {info['status']}\n"
            text += f"Started: {info['started'].strftime('%H:%M:%S')}\n\n"

        await query.edit_message_text(text, reply_markup=main_menu())

    elif data == "upload":

        context.user_data["upload"] = True

        await query.edit_message_text("Send .py file to upload")

    elif data == "run":

        files = os.listdir(SCRIPTS_DIR)

        if not files:
            await query.edit_message_text("No scripts uploaded")
            return

        kb = []

        for f in files:
            kb.append([InlineKeyboardButton(f"▶ {f}", callback_data=f"run_{f}")])

        await query.edit_message_text("Select script", reply_markup=InlineKeyboardMarkup(kb))

    elif data.startswith("run_"):

        name = data.replace("run_", "")

        path = Path(SCRIPTS_DIR) / name

        start_script(path)

        await query.edit_message_text(f"Started {name}", reply_markup=main_menu())

    elif data == "stop":

        if not script_process:
            await query.edit_message_text("No scripts running")
            return

        kb = []

        for name in script_process:
            kb.append([InlineKeyboardButton(f"🛑 {name}", callback_data=f"stop_{name}")])

        await query.edit_message_text("Select script", reply_markup=InlineKeyboardMarkup(kb))

    elif data.startswith("stop_"):

        name = data.replace("stop_", "")

        if stop_script(name):
            await query.edit_message_text(f"Stopped {name}", reply_markup=main_menu())
        else:
            await query.edit_message_text("Failed to stop", reply_markup=main_menu())

    elif data == "delete":

        files = os.listdir(SCRIPTS_DIR)

        if not files:
            await query.edit_message_text("No scripts available")
            return

        kb = []

        for f in files:
            kb.append([InlineKeyboardButton(f"🗑 {f}", callback_data=f"delete_{f}")])

        await query.edit_message_text("Select script to delete", reply_markup=InlineKeyboardMarkup(kb))

    elif data.startswith("delete_"):

        name = data.replace("delete_", "")

        if delete_script(name):
            await query.edit_message_text(f"Deleted {name}", reply_markup=main_menu())
        else:
            await query.edit_message_text("Failed to delete script", reply_markup=main_menu())

# ================= FILE UPLOAD =================

async def upload_handler(update: Update, context: ContextTypes.DEFAULT_TYPE):

    if not context.user_data.get("upload"):
        return

    doc = update.message.document

    if not doc.file_name.endswith(".py"):
        await update.message.reply_text("Send python file only")
        return

    if len(os.listdir(SCRIPTS_DIR)) >= MAX_SCRIPTS:
        await update.message.reply_text("Script limit reached (200)")
        return

    file = await context.bot.get_file(doc.file_id)

    path = Path(SCRIPTS_DIR) / doc.file_name

    await file.download_to_drive(str(path))

    context.user_data["upload"] = False

    await update.message.reply_text(f"Uploaded {doc.file_name}")

# ================= MAIN =================

async def main():

    app = Application.builder().token(BOT_TOKEN).build()

    app.add_handler(CommandHandler("start", start))

    app.add_handler(CallbackQueryHandler(buttons))

    app.add_handler(MessageHandler(filters.Document.FILE_EXTENSION("py"), upload_handler))

    asyncio.create_task(monitor())

    print("Bot Running...")

    await app.run_polling()


if __name__ == "__main__":

    asyncio.run(main())
