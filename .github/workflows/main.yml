{
  "name": "16GB RDP - 60 Hours",
  "image": "mcr.microsoft.com/devcontainers/base:ubuntu-22.04",
  "features": {
    "ghcr.io/devcontainers/features/docker-in-docker:2": {}
  },
  "customizations": {
    "vscode": {
      "extensions": ["ms-vscode-remote.remote-containers"]
    }
  },
  "postCreateCommand": "apt update && apt install -y openssh-server && service ssh start && echo 'port 2222' >> /etc/ssh/sshd_config && service ssh restart && echo '✅ RDP Ready on port 2222!'",
  "forwardPorts": [2222, 80, 443, 3389]
}
